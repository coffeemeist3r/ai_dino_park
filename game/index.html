<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3a1a" />
    <title>AI Dino Park</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #e8e8d6;
        font-family: ui-monospace, 'Courier New', monospace;
        overflow: hidden;
      }
      #app {
        /* dvh tracks the *visible* viewport on mobile (URL bar in/out, rotation);
           100vh overshoots in landscape and cut the bowl off (BACKLOG-188). */
        height: 100vh;
        height: 100dvh;
      }
      /* Fill the viewport so Phaser Scale.FIT has a box to letterbox into
         (BACKLOG-188); the Scale Manager centers the canvas itself. */
      #game {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
