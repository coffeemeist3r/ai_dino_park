name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: game/package-lock.json

      - name: Install game deps
        run: npm --prefix game ci

      # Pages serves from /<repo>/, so the asset base must match.
      - name: Build game
        run: npm --prefix game run build -- --base=/ai_dino_park/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: game/dist

      # Pages backend intermittently answers "Deployment failed, try again later".
      # Retry must happen inside this run: re-running the failed job re-uploads the
      # artifact and deploy-pages then dies on the duplicate "github-pages" artifact.
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy (retry)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
